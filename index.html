<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声解析アシスタント</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <header class="app-header">
        <h1>Audio Analyst</h1>
        <button id="open-settings-btn" class="icon-btn" aria-label="設定">
            <span class="material-symbols-outlined">settings</span>
        </button>
    </header>

    <main class="app-main">
        <section id="upload-section" class="card active">
            <h2>音声ファイルをアップロード</h2>
            <div id="drop-zone" class="drop-zone">
                <span class="material-symbols-outlined icon-large">upload_file</span>
                <p>タップしてファイルを選択<br>またはドラッグ＆ドロップ</p>
                <input type="file" id="audio-file" accept="audio/*,.wav,.mp3,.aiff,.aac,.ogg,.flac,.m4a" style="display: none;">
            </div>
            <div id="file-info" class="file-info hidden">
                <span class="material-symbols-outlined">audio_file</span>
                <div class="file-details">
                    <span id="file-name" class="file-name">filename.mp3</span>
                    <span id="file-size" class="file-size">3.2 MB</span>
                </div>
                <button id="remove-file-btn" class="icon-btn remove-btn">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div id="error-message" class="error-message hidden">
                <span class="material-symbols-outlined">error</span>
                <span id="error-text">エラーが発生しました。</span>
            </div>
            <button id="process-btn" class="primary-btn" disabled>
                <span class="btn-text">解析を開始する</span>
                <div class="loader hidden"></div>
            </button>
        </section>

        <section id="result-section" class="card hidden">
            <div class="tabs">
                <button class="tab-btn active" data-target="transcript">文字起こし</button>
                <button class="tab-btn" data-target="summary">要約</button>
                <button class="tab-btn" data-target="keypoints">要点抽出</button>
            </div>
            
            <div class="tab-content active" id="transcript">
                <textarea readonly placeholder="ここに文字起こしの結果が表示されます..."></textarea>
            </div>
            <div class="tab-content" id="summary">
                <textarea readonly placeholder="ここに要約が表示されます..."></textarea>
            </div>
            <div class="tab-content" id="keypoints">
                <textarea readonly placeholder="ここに要点が表示されます..."></textarea>
            </div>

            <div class="action-buttons">
                <button id="copy-btn" class="secondary-btn">
                    <span class="material-symbols-outlined">content_copy</span> コピー
                </button>
                <button id="reset-btn" class="secondary-btn">
                    <span class="material-symbols-outlined">refresh</span> やり直す
                </button>
            </div>
        </section>
    </main>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>設定</h2>
                <button id="close-settings-btn" class="icon-btn">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="modal-body">
                <label for="api-key">Gemini API キー</label>
                <input type="password" id="api-key" placeholder="AIzaSy...">
                <p class="help-text">
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer">
                        APIキーの取得はこちら (Google AI Studio)
                    </a>
                </p>
                <button id="save-settings-btn" class="primary-btn">保存して閉じる</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
